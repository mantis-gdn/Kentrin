<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kentrin Wallet Test (Ed25519)</title>

  <style>
    body {
      background: #000;
      color: #e6e6e6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    .small {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #111;
      color: #e6e6e6;
      border: 1px solid #333;
      border-radius: 10px;
      font-family: monospace;
    }

    button {
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #222;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    pre {
      background: #111;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>

<h1>Kentrin Wallet Test</h1>
<div class="small">
Generates an Ed25519 keypair in your browser, derives a KU address from the public key,
requests a server-side treasury mint, signs a KU transfer message, and submits it to the permanent ledger endpoint.
</div>

<button id="btnGen">1) Generate Keypair</button>
<button id="btnMint">2) Treasury Mint Test Bill</button>

<textarea id="pubPem" rows="6" placeholder="Public Key PEM"></textarea>

<div class="row">
  <input id="noteId" placeholder="note_id (sha256 hex)" value="" />
  <input id="nonce" placeholder="nonce" value="random-123" />
</div>

<div class="row">
  <input id="fromAddr" placeholder="from (KU address)" value="" />
  <input id="toAddr" placeholder="to (KU address)" value="" />
</div>

<button id="btnSign">3) Sign Message</button>
<textarea id="canonical" rows="3" placeholder="Canonical message"></textarea>
<textarea id="sigB64" rows="3" placeholder="Signature (base64)"></textarea>

<button id="btnSend">4) Send to Ledger</button>

<pre id="output">Output will appear here...</pre>

<script>
const $ = (id) => document.getElementById(id.startsWith("#") ? id.slice(1) : id);

let keypair = null;
let lastTimestamp = null;

const GENESIS = 1704067200;
const EPOCH_INDEX = 0;
const DENOM = 10;

function canonicalTransferMessage({ note_id, from, to, ts, nonce }) {
  return `KU|v1|TRANSFER|${note_id}|${from}|${to}|${ts}|${nonce}`;
}

function bufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = "";
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function base64ToPem(base64, label) {
  const lines = base64.match(/.{1,64}/g) || [];
  return `-----BEGIN ${label}-----\n${lines.join("\n")}\n-----END ${label}-----\n`;
}

async function exportPublicKeyPem(publicKey) {
  const spki = await crypto.subtle.exportKey("spki", publicKey);
  const b64 = bufferToBase64(spki);
  return base64ToPem(b64, "PUBLIC KEY");
}

async function sha256Hex(bytes) {
  const hashBuf = await crypto.subtle.digest("SHA-256", bytes);
  const hashArr = Array.from(new Uint8Array(hashBuf));
  return hashArr.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function sha256HexFromString(s) {
  const buf = new TextEncoder().encode(s);
  return await sha256Hex(buf);
}

async function deriveKUAddress(publicKey) {
  const spki = await crypto.subtle.exportKey("spki", publicKey);
  const hex = await sha256Hex(spki);
  return "KU1" + hex.slice(0, 40);
}

async function mintNoteId({ genesis, epoch_index, denom, owner_address, mint_nonce }) {
  const canonical = `KU|v1|MINT|${genesis}|${epoch_index}|${denom}|${owner_address}|${mint_nonce}`;
  return await sha256HexFromString(canonical);
}

function nowUnix() {
  return Math.floor(Date.now() / 1000);
}

$("#btnGen").addEventListener("click", async () => {
  try {
    keypair = await crypto.subtle.generateKey(
      { name: "Ed25519" },
      true,
      ["sign", "verify"]
    );

    const pem = await exportPublicKeyPem(keypair.publicKey);
    $("#pubPem").value = pem;

    const fromKU = await deriveKUAddress(keypair.publicKey);
    $("#fromAddr").value = fromKU;

    $("#toAddr").value = "KU1" + "0".repeat(40);

    const mint_nonce = crypto.getRandomValues(new Uint32Array(1))[0].toString(16);
    const note_id = await mintNoteId({
      genesis: GENESIS,
      epoch_index: EPOCH_INDEX,
      denom: DENOM,
      owner_address: fromKU,
      mint_nonce
    });

    $("#noteId").value = note_id;

    $("#output").textContent =
      `Keypair generated.\n` +
      `KU address: ${fromKU}\n` +
      `Local test note_id: ${note_id}\n` +
      `Denom: ${DENOM} KU\n\n` +
      `Now click "Treasury Mint Test Bill" to get a server-minted note_id.`;
  } catch (err) {
    $("#output").textContent = "Key generation error: " + err.message;
  }
});

$("#btnMint").addEventListener("click", async () => {
  try {
    if (!keypair) throw new Error("Generate keypair first.");

    const mintSecretEl = $("#mintSecret");
    if (!mintSecretEl) throw new Error('Missing #mintSecret input in HTML.');

    const treasury_mint_secret = mintSecretEl.value.trim();
    if (!treasury_mint_secret) throw new Error("Enter treasury mint secret first.");

    const response = await fetch("/.netlify/functions/treasury-mint-test", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        to_public_key_pem: $("#pubPem").value.trim(),
        denom: DENOM,
        epoch_index: EPOCH_INDEX,
        genesis: GENESIS,
        treasury_mint_secret
      })
    });

    const text = await response.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      $("#output").textContent = `Mint returned non-JSON:\n${text}`;
      return;
    }

    if (!response.ok) {
      $("#output").textContent = JSON.stringify(data, null, 2);
      return;
    }

    $("#noteId").value = data.note_id;
    $("#fromAddr").value = data.to_address;

    $("#output").textContent =
      `Treasury mint successful.\n` +
      `To: ${data.to_address}\n` +
      `Denom: ${data.denom}\n` +
      `note_id: ${data.note_id}\n` +
      `txid: ${data.txid}\n\n` +
      `You can now sign and send this bill to the ledger.`;
  } catch (err) {
    $("#output").textContent = "Mint error: " + err.message;
  }
});

$("#btnSign").addEventListener("click", async () => {
  try {
    if (!keypair) throw new Error("Generate keypair first.");

    const note_id = $("#noteId").value.trim().toLowerCase();
    const from = $("#fromAddr").value.trim();
    const to = $("#toAddr").value.trim();
    const nonce = $("#nonce").value.trim();
    const ts = nowUnix();
    lastTimestamp = ts;

    if (!/^[a-f0-9]{64}$/.test(note_id)) throw new Error("note_id must be 64 hex chars (sha256).");
    if (!from.startsWith("KU1")) throw new Error("from address must start with KU1");
    if (!to.startsWith("KU1")) throw new Error("to address must start with KU1");

    const message = canonicalTransferMessage({ note_id, from, to, ts, nonce });
    $("#canonical").value = message;

    const signature = await crypto.subtle.sign(
      { name: "Ed25519" },
      keypair.privateKey,
      new TextEncoder().encode(message)
    );

    $("#sigB64").value = bufferToBase64(signature);
    $("#output").textContent = "Message signed.";
  } catch (err) {
    $("#output").textContent = "Signing error: " + err.message;
  }
});

$("#btnSend").addEventListener("click", async () => {
  try {
    if (!keypair) throw new Error("Generate keypair first.");

    const body = {
      note_id: $("#noteId").value.trim().toLowerCase(),
      denom: DENOM,
      from: $("#fromAddr").value.trim(),
      to: $("#toAddr").value.trim(),
      ts: lastTimestamp ?? nowUnix(),
      nonce: $("#nonce").value.trim(),
      from_public_key_pem: $("#pubPem").value.trim(),
      signature_b64: $("#sigB64").value.trim()
    };

    const response = await fetch("/.netlify/functions/ledger-submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    const text = await response.text();
    $("#output").textContent = text;
  } catch (err) {
    $("#output").textContent = "Send error: " + err.message;
  }
});
</script>

</body>
</html>
