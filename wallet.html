<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Kentrin Wallet</title>

<style>
body{background:#000;color:#e6e6e6;font-family:system-ui;max-width:650px;margin:auto;padding:20px}
input,textarea,button{width:100%;margin:8px 0;padding:10px;background:#111;color:#e6e6e6;border:1px solid #333;border-radius:6px;font-family:monospace}
pre{background:#111;padding:10px;border-radius:6px}
</style>
</head>

<body>

<h2>Kentrin Wallet</h2>

<button id="gen">Generate Wallet</button>

<input id="addr" placeholder="address" readonly>
<textarea id="pub" placeholder="public key"></textarea>

<hr>

<input id="note" placeholder="note_id">
<input id="to" placeholder="recipient address">
<input id="nonce" value="test123">

<button id="sign">Sign</button>

<textarea id="msg" placeholder="canonical message"></textarea>
<textarea id="sig" placeholder="signature"></textarea>

<button id="send">Send</button>

<pre id="out"></pre>

<script>

const $=id=>document.getElementById(id)

let kp,ts

const now=()=>Math.floor(Date.now()/1000)

const sha256=async b=>{
 const h=await crypto.subtle.digest("SHA-256",b)
 return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,"0")).join("")
}

const b64=b=>{
 let s=""
 for(const c of new Uint8Array(b))s+=String.fromCharCode(c)
 return btoa(s)
}

const addr=async pub=>{
 const spki=await crypto.subtle.exportKey("spki",pub)
 const h=await sha256(spki)
 return "KU1"+h.slice(0,40)
}

const pem=async pub=>{
 const spki=await crypto.subtle.exportKey("spki",pub)
 const base=b64(spki).match(/.{1,64}/g).join("\n")
 return `-----BEGIN PUBLIC KEY-----\n${base}\n-----END PUBLIC KEY-----`
}

document.addEventListener("DOMContentLoaded",()=>{

$("#gen").onclick=async()=>{
 kp=await crypto.subtle.generateKey({name:"Ed25519"},true,["sign","verify"])
 $("#addr").value=await addr(kp.publicKey)
 $("#pub").value=await pem(kp.publicKey)
}

$("#sign").onclick=async()=>{
 const note=$("#note").value
 const from=$("#addr").value
 const to=$("#to").value
 const nonce=$("#nonce").value

 ts=now()

 const msg=`KU|v1|TRANSFER|${note}|${from}|${to}|${ts}|${nonce}`

 $("#msg").value=msg

 const sig=await crypto.subtle.sign(
  {name:"Ed25519"},
  kp.privateKey,
  new TextEncoder().encode(msg)
 )

 $("#sig").value=b64(sig)
}

$("#send").onclick=async()=>{

 const body={
  note_id:$("#note").value,
  from:$("#addr").value,
  to:$("#to").value,
  ts,
  nonce:$("#nonce").value,
  from_public_key_pem:$("#pub").value,
  signature_b64:$("#sig").value
 }

 const r=await fetch("/.netlify/functions/ledger-submit",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(body)
 })

 $("#out").textContent=await r.text()
}

})

</script>

</body>
</html>
