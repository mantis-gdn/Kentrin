<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Kentrin Test Wallet</title>

<style>
body{
 background:#000;
 color:#e6e6e6;
 font-family:system-ui;
 max-width:700px;
 margin:auto;
 padding:20px;
}

input,textarea,button{
 width:100%;
 padding:10px;
 margin:8px 0;
 background:#111;
 color:#e6e6e6;
 border:1px solid #333;
 border-radius:8px;
 font-family:monospace;
}

button{
 cursor:pointer;
}

pre{
 background:#111;
 border:1px solid #333;
 padding:12px;
 border-radius:10px;
}
</style>
</head>

<body>

<h1>Kentrin Test Wallet</h1>

<button id="gen">Generate Wallet</button>

<label>Address</label>
<input id="addr" readonly>

<label>Public Key</label>
<textarea id="pub" rows="5" readonly></textarea>

<hr>

<label>note_id</label>
<input id="note">

<label>to address</label>
<input id="to">

<label>nonce</label>
<input id="nonce" value="test123">

<button id="sign">Sign Transfer</button>

<label>canonical message</label>
<textarea id="canon" rows="3"></textarea>

<label>signature</label>
<textarea id="sig" rows="3"></textarea>

<button id="send">Send Transfer</button>

<pre id="out"></pre>

<script>

const $ = id => document.getElementById(id)

let keypair=null
let ts=null

function now(){
 return Math.floor(Date.now()/1000)
}

function canonical(note,from,to,ts,nonce){
 return `KU|v1|TRANSFER|${note}|${from}|${to}|${ts}|${nonce}`
}

function buf2b64(buf){
 const bytes=new Uint8Array(buf)
 let s=""
 for(let b of bytes) s+=String.fromCharCode(b)
 return btoa(s)
}

async function sha256(buf){
 const hash=await crypto.subtle.digest("SHA-256",buf)
 return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,"0")).join("")
}

async function deriveAddr(pub){
 const spki=await crypto.subtle.exportKey("spki",pub)
 const hex=await sha256(spki)
 return "KU1"+hex.slice(0,40)
}

async function exportPem(pub){
 const spki=await crypto.subtle.exportKey("spki",pub)
 const b64=buf2b64(spki)
 const lines=b64.match(/.{1,64}/g)
 return "-----BEGIN PUBLIC KEY-----\n"+lines.join("\n")+"\n-----END PUBLIC KEY-----"
}

$("#gen").onclick = async () => {

 keypair = await crypto.subtle.generateKey(
  {name:"Ed25519"},
  true,
  ["sign","verify"]
 )

 const addr = await deriveAddr(keypair.publicKey)
 const pem = await exportPem(keypair.publicKey)

 $("#addr").value = addr
 $("#pub").value = pem

 $("#out").textContent="wallet generated"
}

$("#sign").onclick = async () => {

 if(!keypair) return

 const note=$("#note").value.trim()
 const from=$("#addr").value.trim()
 const to=$("#to").value.trim()
 const nonce=$("#nonce").value.trim()

 ts=now()

 const msg=canonical(note,from,to,ts,nonce)

 $("#canon").value=msg

 const sig=await crypto.subtle.sign(
  {name:"Ed25519"},
  keypair.privateKey,
  new TextEncoder().encode(msg)
 )

 $("#sig").value=buf2b64(sig)

 $("#out").textContent="message signed"
}

$("#send").onclick = async () => {

 const body={
  note_id:$("#note").value.trim(),
  from:$("#addr").value.trim(),
  to:$("#to").value.trim(),
  ts:ts,
  nonce:$("#nonce").value.trim(),
  from_public_key_pem:$("#pub").value.trim(),
  signature_b64:$("#sig").value.trim()
 }

 const res = await fetch("/.netlify/functions/ledger-submit",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(body)
 })

 const text = await res.text()

 $("#out").textContent=text
}

</script>

</body>
</html>
