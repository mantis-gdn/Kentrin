<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Kentrin Dev Tool</title>

<style>
body{
 background:#000;
 color:#e6e6e6;
 font-family:system-ui;
 max-width:900px;
 margin:auto;
 padding:20px;
}

.row{
 display:flex;
 gap:20px;
}

.wallet{
 flex:1;
 border:1px solid #333;
 padding:15px;
 border-radius:10px;
 background:#0b0b0b;
}

input,textarea,button{
 width:100%;
 margin:6px 0;
 padding:10px;
 background:#111;
 color:#e6e6e6;
 border:1px solid #333;
 border-radius:6px;
 font-family:monospace;
}

button{cursor:pointer}

.controls{
 margin-top:20px;
}

pre{
 background:#111;
 padding:10px;
 border-radius:6px;
}
</style>
</head>

<body>

<h1>Kentrin Dev Tool</h1>

<div class="row">

<div class="wallet">
<h3>Wallet A</h3>
<button id="genA">Generate</button>
<input id="addrA" placeholder="address">
<textarea id="pubA" rows="4" placeholder="public key"></textarea>
</div>

<div class="wallet">
<h3>Wallet B</h3>
<button id="genB">Generate</button>
<input id="addrB" placeholder="address">
<textarea id="pubB" rows="4" placeholder="public key"></textarea>
</div>

</div>

<hr>

<input id="note" placeholder="note_id">

<div class="controls">

<button id="AtoB">Transfer A → B</button>
<button id="BtoA">Transfer B → A</button>

<button id="ping">Start Ping Pong</button>
<button id="stop">Stop</button>

</div>

<pre id="out"></pre>

<script>

const $=id=>document.getElementById(id)

let A={},B={}
let loop=false

const now=()=>Math.floor(Date.now()/1000)

const sha256=async b=>{
 const h=await crypto.subtle.digest("SHA-256",b)
 return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,"0")).join("")
}

const b64=b=>{
 let s=""
 for(const c of new Uint8Array(b))s+=String.fromCharCode(c)
 return btoa(s)
}

const addr=async pub=>{
 const spki=await crypto.subtle.exportKey("spki",pub)
 const hex=await sha256(spki)
 return "KU1"+hex.slice(0,40)
}

const pem=async pub=>{
 const spki=await crypto.subtle.exportKey("spki",pub)
 const base=b64(spki).match(/.{1,64}/g).join("\n")
 return `-----BEGIN PUBLIC KEY-----\n${base}\n-----END PUBLIC KEY-----`
}

async function gen(wallet,addrField,pubField){

 wallet.kp=await crypto.subtle.generateKey({name:"Ed25519"},true,["sign","verify"])

 const address=await addr(wallet.kp.publicKey)
 const p=await pem(wallet.kp.publicKey)

 $(addrField).value=address
 $(pubField).value=p

 wallet.addr=address
 wallet.pem=p
}

$("#genA").onclick=()=>gen(A,"addrA","pubA")
$("#genB").onclick=()=>gen(B,"addrB","pubB")

async function transfer(from,to){

 const note=$("#note").value
 const nonce=Math.random().toString(36).slice(2)
 const ts=now()

 const msg=`KU|v1|TRANSFER|${note}|${from.addr}|${to.addr}|${ts}|${nonce}`

 const sig=await crypto.subtle.sign(
  {name:"Ed25519"},
  from.kp.privateKey,
  new TextEncoder().encode(msg)
 )

 const body={
  note_id:note,
  from:from.addr,
  to:to.addr,
  ts,
  nonce,
  from_public_key_pem:from.pem,
  signature_b64:b64(sig)
 }

 const r=await fetch("/.netlify/functions/ledger-submit",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(body)
 })

 const text=await r.text()

 $("#out").textContent=text
}

$("#AtoB").onclick=()=>transfer(A,B)
$("#BtoA").onclick=()=>transfer(B,A)

$("#ping").onclick=async()=>{

 loop=true

 while(loop){

  await transfer(A,B)
  await new Promise(r=>setTimeout(r,1200))

  if(!loop)break

  await transfer(B,A)
  await new Promise(r=>setTimeout(r,1200))

 }

}

$("#stop").onclick=()=>loop=false

</script>

</body>
</html>
