<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kentrin Dev Tool</title>

<style>

body{
background:#000;
color:#e6e6e6;
font-family:system-ui;
max-width:900px;
margin:auto;
padding:20px;
}

.row{
display:flex;
gap:20px;
}

.wallet{
flex:1;
border:1px solid #333;
padding:15px;
border-radius:10px;
background:#0b0b0b;
}

input,textarea,button{
width:100%;
margin:6px 0;
padding:10px;
background:#111;
color:#e6e6e6;
border:1px solid #333;
border-radius:6px;
font-family:monospace;
}

button{cursor:pointer}

pre{
background:#111;
padding:10px;
border-radius:6px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Kentrin Dev Tool</h1>

<div class="row">

<div class="wallet">
<h3>Wallet A</h3>
<button id="genA">Generate</button>
<input id="addrA" placeholder="address">
<textarea id="pubA" rows="4" placeholder="public key"></textarea>
</div>

<div class="wallet">
<h3>Wallet B</h3>
<button id="genB">Generate</button>
<input id="addrB" placeholder="address">
<textarea id="pubB" rows="4" placeholder="public key"></textarea>
</div>

</div>

<hr>

<input id="note" placeholder="note_id">

<button id="AtoB">Transfer A → B</button>
<button id="BtoA">Transfer B → A</button>

<button id="ping">Start Ping Pong</button>
<button id="stop">Stop</button>

<pre id="out"></pre>

<script>

const genA = document.getElementById("genA")
const genB = document.getElementById("genB")

const AtoB = document.getElementById("AtoB")
const BtoA = document.getElementById("BtoA")

const ping = document.getElementById("ping")
const stop = document.getElementById("stop")

const out = document.getElementById("out")

let A = {}
let B = {}

let running = false


function b64(buf){
let s=""
for(const b of new Uint8Array(buf)) s+=String.fromCharCode(b)
return btoa(s)
}


async function sha256(buf){
const h = await crypto.subtle.digest("SHA-256",buf)
return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,"0")).join("")
}


async function address(pub){

const spki = await crypto.subtle.exportKey("spki",pub)

const hex = await sha256(spki)

return "KU1"+hex.slice(0,40)

}


async function pem(pub){

const spki = await crypto.subtle.exportKey("spki",pub)

const base = b64(spki).match(/.{1,64}/g).join("\n")

return `-----BEGIN PUBLIC KEY-----
${base}
-----END PUBLIC KEY-----`

}


async function generate(wallet,addrField,pubField){

wallet.kp = await crypto.subtle.generateKey(
{name:"Ed25519"},
true,
["sign","verify"]
)

wallet.addr = await address(wallet.kp.publicKey)
wallet.pem = await pem(wallet.kp.publicKey)

document.getElementById(addrField).value = wallet.addr
document.getElementById(pubField).value = wallet.pem

}


genA.addEventListener("click", ()=>generate(A,"addrA","pubA"))
genB.addEventListener("click", ()=>generate(B,"addrB","pubB"))


function now(){
return Math.floor(Date.now()/1000)
}


async function transfer(from,to){

const note = document.getElementById("note").value

if(!note){
alert("Paste note_id")
return
}

const nonce = Math.random().toString(36).slice(2)

const ts = now()

const msg = `KU|v1|TRANSFER|${note}|${from.addr}|${to.addr}|${ts}|${nonce}`


const sig = await crypto.subtle.sign(
{name:"Ed25519"},
from.kp.privateKey,
new TextEncoder().encode(msg)
)


const body = {

note_id: note,
from: from.addr,
to: to.addr,
denom: 1,
ts,
nonce,
from_public_key_pem: from.pem,
signature_b64: b64(sig)

}


const r = await fetch("/.netlify/functions/ledger-submit",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)

})


out.textContent = await r.text()

}


AtoB.addEventListener("click", ()=>transfer(A,B))
BtoA.addEventListener("click", ()=>transfer(B,A))


ping.addEventListener("click", async ()=>{

running = true

while(running){

await transfer(A,B)
await new Promise(r=>setTimeout(r,1200))

if(!running) break

await transfer(B,A)
await new Promise(r=>setTimeout(r,1200))

}

})


stop.addEventListener("click", ()=>running=false)

</script>

</body>
</html>
